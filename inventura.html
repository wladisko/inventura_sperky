<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#14110F">
<title>Inventúra šperkov</title>
<style>
  :root{
    --bg:#14110F; --surface:#1F1B18; --surface-2:#2A2521; --line:#3A332D;
    --ink:#F5EFE7; --ink-dim:#A89C8E;
    --mv:#E0A458; --ny:#7FB3B3; --ok:#6FBF73; --bad:#D9756B; --mic:#E0A458; --mic-live:#D9756B;
    --radius:16px; --mono:'SF Mono',ui-monospace,'Roboto Mono',Menlo,monospace;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);
    font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;overscroll-behavior-y:contain}
  body{min-height:100dvh;display:flex;flex-direction:column}

  header{padding:14px 16px 10px;border-bottom:1px solid var(--line);
    display:flex;align-items:baseline;justify-content:space-between;gap:10px}
  header h1{margin:0;font-size:17px;font-weight:650;letter-spacing:.01em}
  header .sub{font-size:12px;color:var(--ink-dim);font-variant-numeric:tabular-nums}

  .live{padding:16px;border-bottom:1px solid var(--line);background:var(--surface)}
  .heard{min-height:20px;font-size:13px;color:var(--ink-dim);font-style:italic;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:14px}
  .heard.empty{opacity:.5}

  .fieldLabel{font-size:11px;color:var(--ink-dim);margin-bottom:6px}

  /* prefix tlačidlá v rade */
  .prefixRow{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
  .pfx{flex:1 1 0;min-width:64px;height:54px;border-radius:12px;border:1px solid var(--line);
    background:var(--surface-2);color:var(--ink);font-family:var(--mono);font-size:22px;
    font-weight:600;display:flex;align-items:center;justify-content:center;user-select:none}
  .pfx.none{flex:0 0 60px;color:var(--ink-dim);font-size:18px}
  .pfx.sel{border-width:2px}
  .pfx[data-c="MV"]{color:var(--mv)} .pfx[data-c="MV"].sel{border-color:var(--mv)}
  .pfx[data-c="NY"]{color:var(--ny)} .pfx[data-c="NY"].sel{border-color:var(--ny)}
  .pfx.sel:not([data-c="MV"]):not([data-c="NY"]){border-color:var(--ink)}

  /* číslo + počet */
  .numRow{display:flex;align-items:center;gap:14px;margin-bottom:4px}
  .codeWrap{display:flex;align-items:baseline;gap:2px;flex:1}
  .prefixEcho{font-family:var(--mono);font-size:36px;font-weight:700}
  .prefixEcho.MV{color:var(--mv)} .prefixEcho.NY{color:var(--ny)} .prefixEcho.other{color:var(--ink)}
  .numEdit{font-family:var(--mono);font-size:36px;font-weight:700;letter-spacing:.02em;
    background:transparent;border:none;border-bottom:2px solid var(--line);color:var(--ink);
    width:7ch;padding:0 0 4px;outline:none;text-align:left}
  .numEdit:focus{border-bottom-color:var(--mic)}
  .numEdit.empty{color:var(--ink-dim)}
  .qtyBox{display:flex;align-items:center;gap:8px}
  .qstep{width:44px;height:44px;border-radius:11px;border:1px solid var(--line);
    background:var(--surface-2);color:var(--ink);font-size:24px;font-weight:600;
    display:flex;align-items:center;justify-content:center;user-select:none}
  .qstep:active{background:var(--line)}
  .qtyVal{text-align:center;min-width:30px}
  .qtyVal .n{font-family:var(--mono);font-size:28px;font-weight:700;font-variant-numeric:tabular-nums}
  .qtyVal .lbl{font-size:11px;color:var(--ink-dim)}

  .warn{margin-top:10px;font-size:12.5px;color:var(--bad);min-height:16px}

  .actions{display:flex;gap:10px;padding:14px 16px;border-bottom:1px solid var(--line)}
  .mic{flex:1;height:58px;border:none;border-radius:var(--radius);background:var(--mic);
    color:#1a1410;font-size:16px;font-weight:700;display:flex;align-items:center;
    justify-content:center;gap:9px;user-select:none}
  .mic.live{background:var(--mic-live);color:#fff;animation:pulse 1.1s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.72}}
  .mic svg{width:20px;height:20px}
  .confirm{flex:0 0 58px;height:58px;border:none;border-radius:var(--radius);background:var(--ok);
    color:#0d140d;font-size:25px;font-weight:700;display:flex;align-items:center;justify-content:center}
  .confirm:disabled{opacity:.3}

  .list{flex:1;overflow-y:auto;padding:8px 12px 120px}
  .row{display:flex;align-items:center;gap:12px;padding:13px 12px;border-bottom:1px solid var(--line)}
  .row .rc{font-family:var(--mono);font-size:18px;font-weight:600;letter-spacing:.02em}
  .row .rc .p.MV{color:var(--mv)} .row .rc .p.NY{color:var(--ny)} .row .rc .p.unk{color:var(--ink-dim)}
  .row .rq{margin-left:auto;display:flex;align-items:center;gap:6px}
  .row .rq .qn{font-family:var(--mono);font-size:20px;font-weight:700;min-width:34px;
    text-align:center;font-variant-numeric:tabular-nums}
  .mini{width:34px;height:34px;border-radius:9px;border:1px solid var(--line);
    background:var(--surface-2);color:var(--ink);font-size:19px;font-weight:600;
    display:flex;align-items:center;justify-content:center}
  .mini:active{background:var(--line)}
  .del{width:34px;height:34px;border-radius:9px;border:1px solid transparent;background:transparent;
    color:var(--ink-dim);font-size:17px;margin-left:4px}
  .del:active{color:var(--bad)}
  .empty-state{text-align:center;color:var(--ink-dim);padding:48px 24px;font-size:14px;line-height:1.6}

  .foot{position:fixed;left:0;right:0;bottom:0;background:var(--surface);border-top:1px solid var(--line);
    padding:12px 16px;display:flex;gap:10px;align-items:center;
    padding-bottom:calc(12px + env(safe-area-inset-bottom))}
  .foot .stat{font-size:12px;color:var(--ink-dim);line-height:1.4}
  .foot .stat b{color:var(--ink);font-size:15px;font-variant-numeric:tabular-nums}
  .btn{border:1px solid var(--line);background:var(--surface-2);color:var(--ink);
    border-radius:11px;padding:11px 15px;font-size:14px;font-weight:600}
  .btn.primary{background:var(--ink);color:#14110F;border-color:var(--ink)}
  .btn:active{opacity:.8}
  #setupBtn{margin-left:auto}

  .modal{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:flex-end;z-index:50}
  .modal.show{display:flex}
  .sheet{background:var(--surface);width:100%;border-radius:20px 20px 0 0;
    padding:20px 18px calc(20px + env(safe-area-inset-bottom));border-top:1px solid var(--line);
    max-height:86dvh;overflow-y:auto}
  .sheet h2{margin:0 0 4px;font-size:16px}
  .sheet p{margin:0 0 14px;font-size:13px;color:var(--ink-dim);line-height:1.5}
  .sheet label{display:block;font-size:12px;color:var(--ink-dim);margin:14px 0 5px}
  .sheet input{width:100%;background:var(--bg);border:1px solid var(--line);color:var(--ink);
    border-radius:10px;padding:11px 12px;font-size:14px;font-family:var(--mono)}
  .sheet .sheet-actions{display:flex;gap:10px;margin-top:18px}
  .sheet .sheet-actions .btn{flex:1;margin:0;justify-content:center;text-align:center}

  .prefixList{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
  .pchip{display:flex;align-items:center;gap:6px;background:var(--surface-2);border:1px solid var(--line);
    border-radius:9px;padding:7px 10px;font-family:var(--mono);font-size:15px;font-weight:600}
  .pchip .x{color:var(--ink-dim);font-size:14px;padding:0 2px}
  .pchip .x:active{color:var(--bad)}
  .addPrefix{display:flex;gap:8px;margin-top:10px}
  .addPrefix input{flex:1;text-transform:uppercase}
  .addPrefix button{border:1px solid var(--line);background:var(--ink);color:#14110F;
    border-radius:10px;padding:0 16px;font-weight:700;font-size:18px}

  .toast{position:fixed;left:50%;bottom:90px;transform:translateX(-50%);background:var(--ink);
    color:#14110F;padding:11px 18px;border-radius:11px;font-size:13.5px;font-weight:600;opacity:0;
    transition:opacity .25s;z-index:60;pointer-events:none;max-width:88%;text-align:center}
  .toast.show{opacity:1}
  .unsupported{padding:24px;font-size:14px;line-height:1.6;color:var(--bad)}
</style>
</head>
<body>
<header>
  <h1>Inventúra šperkov</h1>
  <span class="sub" id="hdrStat">0 položiek</span>
</header>

<div class="live">
  <div class="heard empty" id="heard">Klikni na mikrofón a diktuj…</div>

  <div class="fieldLabel">Prefix — ťukni na správny</div>
  <div class="prefixRow" id="prefixRow"></div>

  <div class="fieldLabel">Číslo — ťukni a uprav</div>
  <div class="numRow">
    <div class="codeWrap">
      <span class="prefixEcho" id="prefixEcho"></span>
      <input class="numEdit empty" id="numEdit" inputmode="numeric" pattern="[0-9]*" placeholder="––––" autocomplete="off">
    </div>
    <div class="qtyBox">
      <div class="qstep" id="minus">−</div>
      <div class="qtyVal"><div class="n" id="qtyView">1</div><div class="lbl">ks</div></div>
      <div class="qstep" id="plus">+</div>
    </div>
  </div>
  <div class="warn" id="warn"></div>
</div>

<div class="actions">
  <button class="mic" id="micBtn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/></svg>
    <span id="micLabel">Diktovať</span>
  </button>
  <button class="confirm" id="confirmBtn" disabled>✓</button>
</div>

<div class="list" id="list">
  <div class="empty-state" id="emptyState">
    Zatiaľ nič nenaskenované.<br>
    Klikni <b>Diktovať</b> a povedz napr.<br>
    <b>„em vé 4770"</b>
  </div>
</div>

<div class="foot">
  <div class="stat"><div><b id="totItems">0</b> položiek · <b id="totQty">0</b> ks</div></div>
  <button class="btn" id="setupBtn">⚙</button>
  <button class="btn primary" id="exportBtn">Export</button>
</div>

<div class="modal" id="setupModal">
  <div class="sheet">
    <h2>Nastavenia</h2>
    <label>Prefixy kódov (rozpoznávané hlasom aj v tlačidlách)</label>
    <div class="prefixList" id="prefixList"></div>
    <div class="addPrefix">
      <input id="newPrefix" maxlength="4" placeholder="napr. AB" autocomplete="off" autocapitalize="characters" spellcheck="false">
      <button id="addPrefixBtn">+</button>
    </div>
    <label style="margin-top:20px">Adresa Google Sheetu (Apps Script Web App URL)</label>
    <input type="url" id="urlInput" placeholder="https://script.google.com/macros/s/…/exec" autocomplete="off" autocapitalize="off" spellcheck="false">
    <div class="sheet-actions">
      <button class="btn" id="setupCancel">Zavrieť</button>
      <button class="btn primary" id="setupSave">Uložiť</button>
    </div>
  </div>
</div>

<div class="modal" id="exportModal">
  <div class="sheet">
    <h2>Export inventúry</h2>
    <p id="exportInfo">—</p>
    <div class="sheet-actions">
      <button class="btn" id="exportCsv">Stiahnuť CSV</button>
      <button class="btn primary" id="exportSend">Odoslať do Sheetu</button>
    </div>
    <div class="sheet-actions" style="margin-top:10px">
      <button class="btn" id="exportClear" style="flex:1;color:var(--bad)">Vymazať všetko po exporte</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
//////////////////// ÚLOŽISKO ////////////////////
const LS_ITEMS='inv_items_v1', LS_URL='inv_url_v1', LS_PREF='inv_prefixes_v1';
let items = load(LS_ITEMS) || [];
let scriptUrl = localStorage.getItem(LS_URL) || '';
let prefixes = load(LS_PREF) || ['MV','NY'];

function load(k){ try{return JSON.parse(localStorage.getItem(k))}catch(e){return null} }
function save(){ localStorage.setItem(LS_ITEMS, JSON.stringify(items)); }
function savePrefixes(){ localStorage.setItem(LS_PREF, JSON.stringify(prefixes)); }

//////////////////// STAGE ////////////////////
let stage = { prefix: prefixes.includes('MV')?'MV':(prefixes[0]||''), number:'', qty:1 };

//////////////////// MAPOVANIE REČI ////////////////////
const WORDNUM = {
  'nula':'0','jeden':'1','jedna':'1','dva':'2','dve':'2','tri':'3','štyri':'4','styri':'4',
  'päť':'5','pat':'5','šesť':'6','sest':'6','sedem':'7','osem':'8','deväť':'9','devat':'9'
};
function buildPrefixPatterns(){
  return [
    {re:/\b(em\s*vé|em\s*ve|emvé|emve|m\s*v|mv|em\s*v)\b/g, prefix:'MV'},
    {re:/\b(en\s*ypsilon|en\s*y|eny|enwaj|en\s*waj|n\s*y|ny|en\s*ipsilon)\b/g, prefix:'NY'}
  ];
}
function normalizeSpeech(raw){
  let s = raw.toLowerCase().replace(/[.,\-_/]/g,' ').replace(/\s+/g,' ').trim();
  for(const p of prefixes){ s=s.replace(new RegExp('\\b('+p.toLowerCase()+')(\\d)','g'),'$1 $2'); }
  for(const {re,prefix} of buildPrefixPatterns()) s=s.replace(re,' '+prefix+' ');
  for(const p of prefixes){ if(p==='MV'||p==='NY') continue;
    s=s.replace(new RegExp('\\b'+p.toLowerCase()+'\\b','g'),' '+p+' '); }
  return s;
}
function parseSpeech(text){
  let s=normalizeSpeech(text);
  s=s.split(' ').map(w=>WORDNUM[w]!==undefined?WORDNUM[w]:w).join(' ');
  const up=prefixes.map(p=>p.toUpperCase());
  for(const p of up){ s=s.replace(new RegExp('\\b('+p+')(\\d)','g'),'$1 $2'); }
  s=s.replace(/\b\d(?: \d\b)+(?= \d\b (?:kus|kusy|kusov|ks)\b)/g,m=>m.replace(/ /g,''));
  s=s.replace(/\b\d(?: \d\b)+(?! \d\b (?:kus|kusy|kusov|ks)\b)/g,m=>m.replace(/ /g,''));
  s=s.replace(/\s+/g,' ').trim();
  const kusIdx=s.search(/\b(kus|kusy|kusov|ks)\b/);
  let qty=null,codePart=s;
  if(kusIdx>-1){
    const before=s.slice(0,kusIdx).trim();
    const qm=before.match(/(\d+)\s*$/); if(qm)qty=parseInt(qm[1],10);
    codePart=before.replace(/(\d+)\s*$/,' ')+' '+s.slice(kusIdx).replace(/\b(kus|kusy|kusov|ks)\b/g,' ');
  }
  let prefix=null;
  for(const p of up){ if(new RegExp('\\b'+p+'\\b').test(codePart)){prefix=p;break;} }
  const groups=(codePart.match(/\d+/g)||[]);
  let number=groups.length?groups.slice().sort((a,b)=>b.length-a.length)[0]:null;
  return { prefix, number, qty };
}

//////////////////// HLAS (auto-stop) ////////////////////
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
let recog=null, listening=false, lastFinal='', silenceTimer=null;
const micBtn=document.getElementById('micBtn'),
      micLabel=document.getElementById('micLabel'),
      heard=document.getElementById('heard');

if(!SR){
  document.querySelector('.actions').innerHTML =
    '<div class="unsupported">Tento prehliadač nepodporuje hlasové zadávanie. Otvor appku v <b>Chrome na Androide</b> z <b>https://</b> adresy. Zadávať sa dá aj ručne.</div>';
} else {
  recog=new SR();
  recog.lang='sk-SK';
  recog.interimResults=true;
  recog.maxAlternatives=3;
  recog.continuous=false;   // jednorazový režim — mikrofón sa po dohovorení čisto vypne (žiadne hlučné reštarty)

  recog.onresult=(e)=>{
    let interim='', finalChunk='';
    for(let i=e.resultIndex;i<e.results.length;i++){
      const t=e.results[i][0].transcript;
      if(e.results[i].isFinal) finalChunk+=t+' '; else interim+=t;
    }
    const shown=(lastFinal+' '+finalChunk+interim).trim();
    if(shown){ heard.textContent='„'+shown+'"'; heard.classList.remove('empty'); }
    if(finalChunk){ lastFinal=(lastFinal+' '+finalChunk).trim(); applyParsed(parseSpeech(lastFinal)); }
  };
  // mikrofón sa zapne raz a po dohovorení skončí — bez auto-reštartu, takže žiadne opakované pípanie
  recog.onend=()=>{ listening=false; finishListening(); };
  recog.onerror=(e)=>{
    if(e.error==='not-allowed'||e.error==='service-not-allowed'){
      listening=false; finishListening(); toast('Povoľ prístup k mikrofónu (potrebné https://)');
    }
  };
}

function stopListening(){
  if(!listening) return;
  listening=false;
  if(silenceTimer){ clearTimeout(silenceTimer); silenceTimer=null; }
  try{ recog.stop(); }catch(e){}
}
function finishListening(){
  micBtn.classList.remove('live'); micLabel.textContent='Diktovať';
  if(stageValid()){ heard.textContent='Zachytené — skontroluj a potvrď ✓'; }
}

micBtn.addEventListener('click',()=>{
  if(!recog) return;
  if(listening){ stopListening(); return; }
  resetStage();          // nové diktovanie => počet späť na 1
  lastFinal='';
  heard.textContent='Počúvam…'; heard.classList.remove('empty');
  micBtn.classList.add('live'); micLabel.textContent='Počúvam…';
  listening=true;
  try{ recog.start(); }catch(e){}
  // časovač ticha sa NEspúšťa tu — naštartuje sa až keď príde prvý zvuk,
  // takže máš čas začať hovoriť aj po dlhšom rozmýšľaní
});

//////////////////// STAGE LOGIKA ////////////////////
function resetStage(){
  stage={ prefix: prefixes.includes('MV')?'MV':(prefixes[0]||''), number:'', qty:1 };
  renderStage();
}
function applyParsed(p){
  if(p.qty && p.qty>0 && p.qty<1000) stage.qty=p.qty;
  if(p.prefix) stage.prefix=p.prefix;
  if(p.number) stage.number=p.number;
  renderStage(true);
}
function currentCode(){ return (stage.prefix||'')+stage.number; }
function stageValid(){ return stage.number.length>0; }

//////////////////// STAGE UI ////////////////////
const prefixRow=document.getElementById('prefixRow'),
      prefixEcho=document.getElementById('prefixEcho'),
      numEdit=document.getElementById('numEdit'),
      qtyView=document.getElementById('qtyView'),
      warn=document.getElementById('warn'),
      confirmBtn=document.getElementById('confirmBtn');

function renderPrefixButtons(){
  prefixRow.innerHTML='';
  prefixes.forEach(p=>{
    const b=document.createElement('button');
    b.className='pfx'+(stage.prefix===p?' sel':'');
    b.dataset.c=p; b.dataset.p=p; b.textContent=p;
    prefixRow.appendChild(b);
  });
  // tlačidlo "žiadny prefix"
  const none=document.createElement('button');
  none.className='pfx none'+(stage.prefix===''?' sel':'');
  none.dataset.p=''; none.textContent='––';
  prefixRow.appendChild(none);
}
prefixRow.addEventListener('click',e=>{
  const b=e.target.closest('.pfx'); if(!b) return;
  stage.prefix=b.dataset.p;
  renderStage();
});

function renderStage(fromVoice){
  renderPrefixButtons();
  const pre=stage.prefix||'';
  prefixEcho.textContent=pre;
  prefixEcho.className='prefixEcho '+(pre==='MV'?'MV':pre==='NY'?'NY':(pre?'other':''));
  if(document.activeElement!==numEdit){
    numEdit.value=stage.number;
    numEdit.classList.toggle('empty', stage.number.length===0);
  }
  qtyView.textContent=stage.qty;
  confirmBtn.disabled=!stageValid();
  warn.textContent='';
  if(stageValid() && !pre) warn.textContent='Bez prefixu — ak treba, ťukni MV/NY hore.';
  if(fromVoice && stageValid() && pre) toast('Skontroluj a potvrď ✓');
}

numEdit.addEventListener('focus',()=>{
  const v=numEdit.value; setTimeout(()=>numEdit.setSelectionRange(v.length,v.length),0);
});
numEdit.addEventListener('input',()=>{
  numEdit.value=numEdit.value.replace(/\D/g,'');
  stage.number=numEdit.value;
  numEdit.classList.toggle('empty', stage.number.length===0);
  confirmBtn.disabled=!stageValid();
});

document.getElementById('plus').addEventListener('click',()=>{ stage.qty++; qtyView.textContent=stage.qty; });
document.getElementById('minus').addEventListener('click',()=>{ if(stage.qty>1){stage.qty--; qtyView.textContent=stage.qty;} });

confirmBtn.addEventListener('click',commitStage);
function commitStage(){
  if(!stageValid()) return;
  stopListening();
  const code=currentCode();
  const ex=items.find(i=>i.code===code);
  if(ex){ ex.qty+=stage.qty; toast('Pripočítané '+code+' → '+ex.qty+' ks'); }
  else { items.unshift({code,qty:stage.qty}); toast('Pridané '+code+' ('+stage.qty+' ks)'); }
  save();
  resetStage(); lastFinal='';
  heard.textContent='Klikni na mikrofón a diktuj…'; heard.classList.add('empty');
  renderList();
}

//////////////////// ZOZNAM ////////////////////
const listEl=document.getElementById('list'), emptyState=document.getElementById('emptyState');
function renderList(){
  listEl.querySelectorAll('.row').forEach(r=>r.remove());
  if(items.length===0) emptyState.style.display='';
  else{
    emptyState.style.display='none';
    items.forEach((it,idx)=>{
      const row=document.createElement('div'); row.className='row';
      row.innerHTML='<div class="rc">'+fmtCodeList(it.code)+'</div>'+
        '<div class="rq">'+
          '<button class="mini" data-a="dec" data-i="'+idx+'">−</button>'+
          '<span class="qn">'+it.qty+'</span>'+
          '<button class="mini" data-a="inc" data-i="'+idx+'">+</button>'+
          '<button class="del" data-a="del" data-i="'+idx+'">✕</button>'+
        '</div>';
      listEl.appendChild(row);
    });
  }
  updateStats();
}
function fmtCodeList(code){
  const m=code&&code.match(/^([A-Z]{0,4})(\d+)$/);
  if(!m) return '<span class="p unk">'+code+'</span>';
  const pre=m[1],num=m[2], cls=(pre==='MV'||pre==='NY')?pre:(pre?'unk':'');
  return (pre?'<span class="p '+cls+'">'+pre+'</span>':'')+num;
}
listEl.addEventListener('click',(e)=>{
  const b=e.target.closest('[data-a]'); if(!b) return;
  const i=+b.dataset.i,a=b.dataset.a;
  if(a==='inc') items[i].qty++;
  else if(a==='dec'){ items[i].qty--; if(items[i].qty<=0) items.splice(i,1); }
  else if(a==='del') items.splice(i,1);
  save(); renderList();
});
function updateStats(){
  const ti=items.length, tq=items.reduce((s,i)=>s+i.qty,0);
  document.getElementById('totItems').textContent=ti;
  document.getElementById('totQty').textContent=tq;
  document.getElementById('hdrStat').textContent=ti+' položiek';
}

//////////////////// NASTAVENIA / PREFIXY ////////////////////
const setupModal=document.getElementById('setupModal'),
      urlInput=document.getElementById('urlInput'),
      prefixListEl=document.getElementById('prefixList'),
      newPrefixInput=document.getElementById('newPrefix');
function renderPrefixChips(){
  prefixListEl.innerHTML='';
  if(prefixes.length===0) prefixListEl.innerHTML='<span style="color:var(--ink-dim);font-size:13px">Žiadne prefixy</span>';
  prefixes.forEach((p,idx)=>{
    const c=document.createElement('div'); c.className='pchip';
    c.innerHTML=p+'<span class="x" data-i="'+idx+'">✕</span>';
    prefixListEl.appendChild(c);
  });
}
prefixListEl.addEventListener('click',e=>{
  const x=e.target.closest('.x'); if(!x) return;
  prefixes.splice(+x.dataset.i,1); savePrefixes(); renderPrefixChips();
});
document.getElementById('addPrefixBtn').addEventListener('click',addPrefix);
newPrefixInput.addEventListener('keydown',e=>{ if(e.key==='Enter') addPrefix(); });
function addPrefix(){
  let v=newPrefixInput.value.toUpperCase().replace(/[^A-Z]/g,'');
  if(!v){ toast('Zadaj prefix (písmená)'); return; }
  if(prefixes.includes(v)){ toast(v+' už existuje'); return; }
  prefixes.push(v); savePrefixes(); renderPrefixChips(); newPrefixInput.value='';
  toast('Pridaný prefix '+v);
}
document.getElementById('setupBtn').addEventListener('click',()=>{
  urlInput.value=scriptUrl; renderPrefixChips(); setupModal.classList.add('show');
});
document.getElementById('setupCancel').addEventListener('click',()=>setupModal.classList.remove('show'));
document.getElementById('setupSave').addEventListener('click',()=>{
  scriptUrl=urlInput.value.trim();
  localStorage.setItem(LS_URL,scriptUrl);
  if(!prefixes.includes(stage.prefix)) stage.prefix = prefixes.includes('MV')?'MV':(prefixes[0]||'');
  setupModal.classList.remove('show'); renderStage(); toast('Uložené');
});

//////////////////// EXPORT ////////////////////
const exportModal=document.getElementById('exportModal');
document.getElementById('exportBtn').addEventListener('click',()=>{
  if(items.length===0){ toast('Nie je čo exportovať'); return; }
  document.getElementById('exportInfo').textContent =
    items.length+' položiek · '+items.reduce((s,i)=>s+i.qty,0)+' ks spolu. '+
    (scriptUrl?'Odoslať priamo do Google Sheetu, alebo stiahnuť CSV.':'URL Sheetu nie je nastavená — stiahni CSV alebo nastav URL v ⚙.');
  exportModal.classList.add('show');
});
function buildCsv(){
  const rows=[['kod','pocet','cas']]; const now=new Date().toISOString();
  items.forEach(i=>rows.push([i.code,i.qty,now]));
  return rows.map(r=>r.join(',')).join('\n');
}
document.getElementById('exportCsv').addEventListener('click',()=>{
  const blob=new Blob([buildCsv()],{type:'text/csv'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='inventura_'+new Date().toISOString().slice(0,10)+'.csv';
  a.click(); toast('CSV stiahnuté');
});
document.getElementById('exportSend').addEventListener('click',async ()=>{
  if(!scriptUrl){ toast('Najprv nastav URL v ⚙'); return; }
  toast('Odosielam…');
  try{
    await fetch(scriptUrl,{method:'POST',mode:'no-cors',
      headers:{'Content-Type':'text/plain;charset=utf-8'},
      body:JSON.stringify({items:items, sentAt:new Date().toISOString()})});
    toast('Odoslané do Sheetu ✓'); exportModal.classList.remove('show');
  }catch(e){ toast('Chyba pri odoslaní — skús znova'); }
});
document.getElementById('exportClear').addEventListener('click',()=>{
  if(confirm('Naozaj vymazať všetkých '+items.length+' položiek? Over, že export prebehol.')){
    items=[]; save(); renderList(); exportModal.classList.remove('show'); toast('Vymazané');
  }
});
[setupModal,exportModal].forEach(m=>{ m.addEventListener('click',e=>{ if(e.target===m) m.classList.remove('show'); }); });

//////////////////// TOAST ////////////////////
let toastT;
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('show'),1900);
}

//////////////////// ŠTART ////////////////////
renderStage(); renderList();
</script>
</body>
</html>
